name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Sync shared SOP snapshot
        env:
          SHARED_API_ORIGIN: https://product-launch-sop-hub.real-1-4436.chatgpt.site
          SITES_BYPASS_TOKEN: ${{ secrets.SITES_BYPASS_TOKEN }}
        run: node scripts/sync-shared-state.mjs
      - name: Build static site
        run: npm run build:pages
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./pages-dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
